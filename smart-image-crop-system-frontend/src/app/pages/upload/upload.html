<div class="container">

  <h1 class="title">ระบบตัดภาพบุคคลด้วย AI</h1>

  <div class="upload-box">

    <input
      class="file-input"
      type="file"
      
      (change)="onFileSelected($event)">

    <select class="select-box" (change)="onDetectTypeChange($event)">
      <option value="face">เฉพาะใบหน้า</option>
      <option value="person">ทั้งตัวบุคคล</option>
    </select>

    <button class="send-btn" (click)="sendToAI()">
      ส่งให้ AI ตัดภาพ
    </button>

  </div>

</div>

<div class="example-box">

  <h3 class="title-sup">ตัวอย่างรูปที่ถูกต้อง</h3>

  <div class="example-grid">

    <div class="example-item">
      <img src="https://images.pexels.com/photos/220453/pexels-photo-220453.jpeg" />
      <p class="good">✔ คนเดียว เห็นหน้าชัด</p>
    </div>

    <div class="example-item">
      <img src="https://lh3.googleusercontent.com/proxy/Djgu1LXZk_rqgzK_i3CNHElTmw5lNaMF7Uw_-HyLp1qrStAqudeC0k3xybSngJZl25SnH1hOAYeu6HawTa18TuwoFQonMvlXKMttsJUMWGt2uF0jvjJ92zEg" />
      <p class="good">✔ ทั้งตัว 1 คน</p>
    </div>

    <div class="example-item">
      <img src="https://images.pexels.com/photos/3184360/pexels-photo-3184360.jpeg" />
      <p class="bad">❌ หลายคน (ใช้ไม่ได้)</p>
    </div>

  </div>

</div>

<div class="image-grid">

  <app-show-img
    [title]="'ภาพต้นฉบับ'"
    [imageUrl]="url_img">
  </app-show-img>

  <app-show-img
    [title]="'ภาพที่ AI ตัดแล้ว'"
    [imageUrl]="result_img">
  </app-show-img>

</div>

<app-alert [message]="alertMessage"></app-alert >

<div class="overlay" *ngIf="loading">

  <div class="modal loading">

    <div class="spinner"></div>
    <p>AI กำลังประมวลผลภาพ...</p>

  </div>

</div>
